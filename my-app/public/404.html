<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ThreatReady</title>
    <script>
      // GitHub Pages 404 redirect for React Router
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var url = '/?redirect=' + encodeURIComponent(path + search + hash);
      window.location.replace(url);
    </script>
  </head>
  <body></body>
</html>
